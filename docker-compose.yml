services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: collecte
      POSTGRES_USER: collecte
      POSTGRES_PASSWORD: collecte
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collecte -d collecte"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
